<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Бесконечная процедурная генерация комнат</title>
<style>
    body {
        background: #1a1a1a;
        margin: 0;
        padding: 10px;
        font-family: Arial, sans-serif;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
    }
    canvas {
        background: #222; 
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: auto;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .hint {
        text-align: center;
        color: #888;
        margin-top: 10px;
        font-size: 14px;
    }
    .mobile-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 800px;
        margin: 15px auto 0 auto;
        padding: 0 10px;
    }
    .move-buttons {
        display: flex;
        gap: 15px;
    }
    .touch-btn {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.4);
        width: 65px;
        height: 65px;
        border-radius: 50%;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        touch-action: none; 
    }
    .touch-btn:active {
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0.95);
    }
    .jump-btn {
        width: 80px;
        height: 80px;
        background: rgba(0, 255, 0, 0.2);
        border-color: lime;
        color: lime;
        font-size: 16px;
    }
    .jump-btn:active {
        background: rgba(0, 255, 0, 0.5);
    }
    .download-container {
        text-align: center;
        margin-top: 20px;
    }
    .download-btn {
        background-color: lime;
        color: #111;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="500"></canvas>
<div class="hint">Управление: Клавиатура (Стрелки / WASD) или Экранные кнопки</div>

<div class="mobile-controls">
    <div class="move-buttons">
        <div class="touch-btn" id="btnLeft">←</div>
        <div class="touch-btn" id="btnRight">→</div>
    </div>
    <div class="touch-btn jump-btn" id="btnJump">ВВЕРХ</div>
</div>

<div class="download-container">
    <button class="download-btn" id="downloadBtn">Скачать игру (.html)</button>
</div><script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const player = { 
    x: 50, 
    y: 400, 
    width: 30, 
    height: 50, 
    color: 'lime', 
    vy: 0, 
    speed: 5.5, 
    jumpStrength: 14, 
    onGround: false,
    jumpCount: 0,     
    maxJumps: 2       
};

const gravity = 0.7;
const keys = {};

let platforms = [];
let coins = [];
let enemies = [];
let door = { x: 0, y: 0, width: 40, height: 60, open: false };

let currentLevel = 1;
let score = 0;

const biomes = [
    { name: "КЛАССИЧЕСКИЙ МИР", bg: "#222222", plat: "#8B4513", coin: "gold", door: "#4aeade" },
    { name: "ИЗУМРУДНЫЙ ЛЕС", bg: "#142518", plat: "#2e5c36", coin: "#00FF7F", door: "#ADFF2F" },
    { name: "НЕОНОВЫЙ КИБЕР", bg: "#120a1c", plat: "#ff0055", coin: "#00FFFF", door: "#ba00ff" },
    { name: "ПУСТЫНЯ СМЕРТИ", bg: "#2c2417", plat: "#d2b48c", coin: "#FF4500", door: "#FFD700" },
    { name: "ЛЕДЯНЫЕ ПЕЩЕРЫ", bg: "#15222e", plat: "#4682B4", coin: "#E0FFFF", door: "#00FFFF" },
    { name: "БЕСКОНЕЧНЫЙ КОСМОС", bg: "#05050a", plat: "#4B0082", coin: "#FFFFFF", door: "#FF00FF" }
];

let currentBiome = biomes[0];

function generateNewLevel() {
    let biomeIndex = Math.floor((currentLevel - 1) / 3) % biomes.length;
    currentBiome = biomes[biomeIndex];

    player.x = 50;
    player.y = 350;
    player.vy = 0;
    player.jumpCount = 0;

    platforms = [{ x: 0, y: 450, width: 800, height: 50, color: currentBiome.plat }];
    coins = [];
    enemies = [];

    let currentX = 100;
    let currentY = 370;
    let maxLevelHeight = 100;

    while (currentY > maxLevelHeight) {
        let platWidth = Math.floor(Math.random() * 60) + 100;
        let gapX = Math.floor(Math.random() * 80) + 60; 
        
        if (Math.random() > 0.5) {
            currentX += gapX;
        } else {
            currentX -= (gapX + platWidth);
        }

        currentY -= (Math.floor(Math.random() * 40) + 60);

        if (currentX < 20) currentX = 20;
        if (currentX + platWidth > canvas.width - 20) currentX = canvas.width - platWidth - 20;

        platforms.push({
            x: currentX,
            y: currentY,
            width: platWidth,
            height: 20,
            color: currentBiome.plat
        });

        if (Math.random() < 0.6) {
            coins.push({
                x: currentX + (platWidth / 2) - 5,
                y: currentY - 25,
                size: 10,
                collected: false
            });
        }

        if (Math.random() < 0.4 && platWidth >= 110) {
            enemies.push({
                x: currentX + 10,
                y: currentY - 30,
                width: 25,
                height: 30,
                speed: (Math.random() > 0.5 ? 1.5 : -1.5),
                rangeMin: currentX,
                rangeMax: currentX + platWidth
            });
        }

        currentX = currentX + (Math.random() * 40 - 20);
    }

    let highestPlat = platforms[platforms.length - 1];
    door.x = highestPlat.x + (highestPlat.width / 2) - 20;
    door.y = highestPlat.y - 60;
    door.open = false;
}

generateNewLevel();

function doJump() {
    if (player.jumpCount < player.maxJumps) {
        player.vy = -player.jumpStrength;
        player.jumpCount++;
        player.onGround = false;
    }
}

const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnJump = document.getElementById('btnJump');

btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowLeft'] = true; });
btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowLeft'] = false; });
btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys['ArrowRight'] = true; });
btnRight.addEventListener('touchend', (e) => { e.preventDefault(); keys['ArrowRight'] = false; });
btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); doJump(); });

document.getElementById('downloadBtn').addEventListener('click', () => {
    const htmlCode = document.documentElement.outerHTML;
    const blob = new Blob([htmlCode], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'procedural-platformer.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});

document.addEventListener('keydown', (e) => { 
    if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') && !keys[e.key]) doJump();
    keys[e.key] = true; 
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width && 
           rect1.x + rect1.width > rect2.x && 
           rect1.y < rect2.y + rect2.height && 
           rect1.y + rect1.height > rect2.y;
}

function gameLoop() {
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.vy += gravity;
    player.y += player.vy;
    player.onGround = false;

    for (const plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.vy >= 0 && player.y + player.height - player.vy <= plat.y + 6) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.onGround = true;
                player.jumpCount = 0; 
            }
        }
    }

    for (const enemy of enemies) {
        enemy.x += enemy.speed;
        if (enemy.x <= enemy.rangeMin || enemy.x + enemy.width >= enemy.rangeMax) {
            enemy.speed = -enemy.speed;
        }

        if (checkCollision(player, enemy)) {
            let collectedInThisLevel = coins.filter(c => c.collected).length;
            score -= collectedInThisLevel;
            if (score < 0) score = 0;
            generateNewLevel();
        }
    }

    if (player.y + player.height > canvas.height) {
        generateNewLevel();
    }

    let allCollected = true;
    for (const coin of coins) {
        if (!coin.collected) {
            allCollected = false; 
            if (player.x < coin.x + coin.size && player.x + player.width > coin.x && player.y < coin.y + coin.size && player.y + player.height > coin.y) {
                coin.collected = true;
                score++;
            }
        }
    }

    if (allCollected) door.open = true;

    if (door.open && checkCollision(player, door)) {
        currentLevel++;
        generateNewLevel();
    }

    ctx.fillStyle = currentBiome.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const plat of platforms) {
        ctx.fillStyle = plat.color;
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    for (const coin of coins) {
        if (!coin.collected) {
            ctx.fillStyle = currentBiome.coin;
            ctx.beginPath();
            ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (const enemy of enemies) {
        ctx.fillStyle = 'red';
        ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        ctx.fillStyle = 'white';
        ctx.fillRect(enemy.x + (enemy.speed > 0 ? 15 : 4), enemy.y + 6, 5, 5);
    }

    ctx.fillStyle = door.open ? currentBiome.door : '#555'; 
    ctx.fillRect(door.x, door.y, door.width, door.height);
    ctx.fillStyle = 'gold';
    ctx.beginPath();
    ctx.arc(door.x + (door.open ? 8 : 32), door.y + 30, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = 'white';
    ctx.font = '20px Arial';
    ctx.fillText('Монет: ' + score, 15, 35);
    ctx.fillText('Уровень: ' + currentLevel, 670, 35);

    ctx.fillStyle = currentBiome.door;
    ctx.font = 'bold 16px Arial';
    ctx.fillText('МИР: ' + currentBiome.name, 15, 65);

    if (!door.open) {
        ctx.fillStyle = '#ffb3b3';
        ctx.font = '14px Arial';
        ctx.fillText('Соберите все монеты и избегайте красных врагов!', 260, 35);
    } else {
        ctx.fillStyle = '#b3ffb3';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('Портал открыт! Бегите к двери!', 300, 35);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
