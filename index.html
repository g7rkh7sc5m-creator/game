<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Хардкорный Рогалик Платформер v17</title>
<style>
    * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
    body { background: #0b0b0f; margin: 0; padding: 0; font-family: Arial, sans-serif; overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    /* Контейнер игры жестко центрируется и не выходит за границы дисплея */
    .game-container { position: relative; width: 100%; max-width: 800px; height: 100%; max-height: 500px; display: flex; justify-content: center; align-items: center; }
    canvas { background: #111116; display: block; max-width: 100%; max-height: 100%; box-shadow: 0 0 35px rgba(0,0,0,0.9); object-fit: contain; }
    
    .game-over-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.96); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 5; padding: 15px; overflow-y: auto; }
    .game-over-overlay h1 { color: #ff3333; margin: 0 0 5px 0; font-size: 26px; text-shadow: 0 0 15px rgba(255,0,0,0.6); }
    .timer-text { font-size: 16px; font-weight: bold; margin: 3px 0; color: #ffcc00; }
    .test-revive-btn { background: gold; color: #111; border: none; padding: 8px 18px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 13px; margin-bottom: 10px; }
    .meta-shop-title { font-size: 14px; color: #00ffcc; margin: 5px 0; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 8px rgba(0,255,200,0.3); }
    .meta-upgrades-grid { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; max-width: 500px; }
    .upgrade-card { background: #1a1a24; border: 1px solid #334; border-radius: 6px; padding: 6px; display: flex; flex-direction: column; align-items: center; width: 140px; cursor: pointer; text-align: center; }
    .upgrade-card:hover { border-color: #00ffcc; }
    .upgrade-name { font-size: 10px; font-weight: bold; color: #fff; }
    .upgrade-level { font-size: 9px; color: #889; margin: 2px 0; }
    .upgrade-price { font-size: 10px; color: #ffcc00; font-weight: bold; }
    .shop-title { font-size: 13px; color: #aaa; margin-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
    .skins-grid { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; max-width: 550px; }
    .skin-card { background: #16161f; border: 2px solid #334; border-radius: 6px; padding: 5px; display: flex; flex-direction: column; align-items: center; width: 85px; cursor: pointer; }
    .skin-card.active { border-color: lime; background: #1a2e1a; }
    .skin-preview { width: 18px; height: 26px; margin-bottom: 4px; border-radius: 3px; position: relative; }
    .skin-name { font-size: 9px; font-weight: bold; margin-bottom: 2px; text-align: center; }
    .skin-desc { font-size: 8px; color: #9aa; text-align: center; margin-bottom: 3px; line-height: 1; min-height: 16px; }
    .skin-price { font-size: 9px; color: #ffcc00; font-weight: bold; }
    
    /* ФИКС: Кнопки привязаны к нижней части игрового экрана, а не окна браузера */
    .mobile-ui { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 15px; width: 100%; pointer-events: none; z-index: 10; }
    .move-group, .action-group { display: flex; gap: 8px; pointer-events: auto; align-items: flex-end; }
    
    /* Уменьшили размер кнопок под мобильные пальцы, чтобы они не перекрывали центр */
    .touch-btn { background: rgba(255, 255, 255, 0.15); color: white; border: 1.5px solid rgba(255, 255, 255, 0.4); width: 48px; height: 48px; border-radius: 50%; font-size: 18px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; pointer-events: auto; -webkit-tap-highlight-color: transparent; }
    .touch-btn:active { background: rgba(255, 255, 255, 0.4); }
    
    .jump-btn { width: 56px; height: 56px; background: rgba(0, 255, 0, 0.2); border-color: lime; color: lime; font-size: 12px; }
    .jump-btn:active { background: rgba(0, 255, 0, 0.5); }
    
    .download-container { position: absolute; top: 10px; right: 10px; z-index: 20; }
    .download-btn { background-color: lime; color: #111; border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<div class="download-container"><button class="download-btn" id="downloadBtn">Скачать (.html)</button></div>
<div class="game-container" id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div class="game-over-overlay" id="gameOverOverlay">
        <h1>РЕЗУЛЬТАТ ЗАБЕГА</h1>
        <div class="timer-text" id="timerText">05:00</div>
        <button class="test-revive-btn" id="testReviveBtn">Восстановить за 100 🪙</button>
        <div class="meta-shop-title">ПОСТОЯННЫЕ ТАЛАНТЫ</div>
        <div class="meta-upgrades-grid" id="metaUpgradesGrid"></div>
        <div class="shop-title">МАГАЗИН СКИНОВ С ПАССИВКАМИ</div>
        <div class="skins-grid" id="skinsGrid"></div>
    </div>
    
    <!-- Перенесли блок mobile-ui внутрь контейнера, чтобы кнопки не улетали за рамки игры -->
    <div class="mobile-ui">
        <div class="move-group">
            <div class="touch-btn" id="btnLeft">←</div>
            <div class="touch-btn" id="btnRight">→</div>
        </div>
        <div class="action-group">
            <div class="touch-btn" id="btnHook" style="background:rgba(255,255,0,0.15); border-color:yellow; color:yellow; font-size:10px;">КРЮК</div>
            <div class="touch-btn" id="btnParry" style="background:rgba(255,0,0,0.15); border-color:red; color:red; font-size:10px;">ЩИТ</div>
            <div class="touch-btn" id="btnDash" style="background:rgba(0,150,255,0.15); border-color:#00aeff; color:#00aeff; font-size:10px;">РЫВОК</div>
            <div class="touch-btn jump-btn" id="btnJump">ВВЕРХ</div>
        </div>
    </div>
</div>
<script>const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
const overlay = document.getElementById('gameOverOverlay'); const timerText = document.getElementById('timerText'); 
const skinsGrid = document.getElementById('skinsGrid'); const metaUpgradesGrid = document.getElementById('metaUpgradesGrid');

function resizeCanvas() {
    const targetWidth = 800; const targetHeight = 500; const windowWidth = window.innerWidth; const windowHeight = window.innerHeight;
    let scale = Math.min(windowWidth / targetWidth, windowHeight / targetHeight);
    canvas.width = targetWidth; canvas.height = targetHeight; canvas.style.width = (targetWidth * scale) + 'px'; canvas.style.height = (targetHeight * scale) + 'px';
}
window.addEventListener('resize', resizeCanvas); window.addEventListener('orientationchange', resizeCanvas);
resizeCanvas();

let savedScore = localStorage.getItem('meta_player_score'); let score = savedScore !== null ? parseInt(savedScore) : 0;
let savedLevel = localStorage.getItem('meta_player_level'); let currentLevel = savedLevel !== null ? parseInt(savedLevel) : 1;

let upgradeArmor = parseInt(localStorage.getItem('meta_upg_armor')) || 0;
let upgradeMagnet = parseInt(localStorage.getItem('meta_upg_magnet')) || 0;
let upgradeHealth = parseInt(localStorage.getItem('meta_upg_health')) || 0;

const skinsData = [
    { id: 'lime', name: 'ЛАЙМ', color: 'lime', price: 0, desc: 'Без бонусов' },
    { id: 'ghost', name: 'ПРИЗРАК', color: 'rgba(230,240,255,0.7)', price: 30, desc: 'Иммунитет х2 дольше' },
    { id: 'cyborg', name: 'КИБОРГ', color: '#ba00ff', price: 50, desc: 'Рывок чаще, прыжок -5%' },
    { id: 'midas', name: 'МИДАС', color: '#ffd700', price: 80, desc: '+40% монет из сундуков' },
    { id: 'vulcan', name: 'ВУЛКАН', color: '#ff3300', price: 120, desc: 'Иммун к лаве, скользит' },
    { id: 'ninja', name: 'НИНДЗЯ', color: '#444444', price: 180, desc: 'Тройной прыжок, макс жизней: 2' },
    { id: 'cyan', name: 'ОКЕАН', color: '#00ffff', price: 20, desc: 'Классический стиль' },
    { id: 'ice', name: 'ЛЕД КРИСТАЛ', color: '#a3e5ff', price: 40, desc: 'Классический стиль' },
    { id: 'slime', name: 'СЛИЗЬ', color: '#39ff14', price: 60, desc: 'Классический стиль' },
    { id: 'lightning', name: 'МОЛНИЯ', color: '#ffffff', price: 100, desc: 'Классический стиль' },
    { id: 'matter', name: 'МАТЕРИЯ', color: '#440066', price: 150, desc: 'Классический стиль' }
];

let purchasedSkins = JSON.parse(localStorage.getItem('meta_purchased_skins')) || ['lime'];
let currentSkinColor = localStorage.getItem('meta_current_skin_color') || 'lime';
let currentSkinId = localStorage.getItem('meta_current_skin_id') || 'lime';

let timeScale = 1.0; let isTimeSlowActive = false; let slowModeTimer = 0;
let comboCount = 0; let comboTimer = 0; let currentEvent = { name: "НЕТ", desc: "Обычные условия" };

const player = { 
    x: 385, y: 350, width: 26, height: 44, color: currentSkinColor, skinId: currentSkinId, 
    vx: 0, vy: 0, speed: 5.5, jumpStrength: 13.5, onGround: false, jumpCount: 0, maxJumps: 2, invulnerable: 0,
    dashTimer: 0, dashCooldown: 0, dashDir: 0, lastLeftTime: 0, lastRightTime: 0,
    hookActive: false, hookX: 0, hookY: 0, hookLen: 0, hookAngle: 0, hookSpeed: 0,
    parryActive: 0, parryCooldown: 0, lives: 3
};

const gravity = 0.6; const keys = {};
let platforms = []; let coins = []; let enemies = []; let chests = []; let bullets = []; let spikes = [];
let door = { x: 0, y: 0, width: 44, height: 64, open: false }; let isGameOver = false; let standingOnIce = false; let standingOnMud = false;

let boss = null;
let particles = [];
let dashEchoes = [];
let freezeFrame = 0;const biomes = [
    { name: "КЛАССИЧЕСКИЙ МИР", bg: "#111116", plat: "#5c3a21", coin: "gold", door: "#00ffcc" },
    { name: "ИЗУМРУДНЫЙ ЛЕС", bg: "#0d1410", plat: "#22442b", coin: "#39ff14", door: "#ccff00" },
    { name: "НЕОНОВЫЙ КИБЕР", bg: "#08040d", plat: "#bd0042", coin: "#00ffff", door: "#d600ff" },
    { name: "ЛЕДЯНАЯ БЕЗДНА", bg: "#040912", plat: "#2b435c", coin: "#ffffff", door: "#0099ff" },
    { name: "ВУЛКАНИЧЕСКИЙ АД", bg: "#0f0505", plat: "#3b0f0f", coin: "#ff4500", door: "#ffcc00" }
];
let currentBiome = biomes;

function saveProgress() { 
    localStorage.setItem('meta_player_score', score); 
    localStorage.setItem('meta_player_level', currentLevel); 
    localStorage.setItem('meta_purchased_skins', JSON.stringify(purchasedSkins));
    localStorage.setItem('meta_current_skin_id', player.skinId);
    localStorage.setItem('meta_current_skin_color', player.color);
    localStorage.setItem('meta_upg_armor', upgradeArmor);
    localStorage.setItem('meta_upg_magnet', upgradeMagnet);
    localStorage.setItem('meta_upg_health', upgradeHealth);
}

function generateNewLevel() {
    let biomeIndex = Math.floor((currentLevel - 1) / 3) % biomes.length; 
    currentBiome = biomes[biomeIndex];
    
    let maxAllowedLives = (player.skinId === 'ninja') ? 2 : 3;
    maxAllowedLives += upgradeHealth;
    player.lives = maxAllowedLives;
    
    player.x = 385; player.y = 350; player.vx = 0; player.vy = 0; player.jumpCount = 0;
    player.invulnerable = 60; player.dashTimer = 0; player.dashCooldown = 0;
    player.hookActive = false; player.parryActive = 0; player.parryCooldown = 0;
    comboCount = 0; comboTimer = 0; isGameOver = false; overlay.style.display = 'none';
    standingOnIce = false; standingOnMud = false; boss = null; particles = []; dashEchoes = [];

    let eventRand = Math.random();
    if (eventRand < 0.15) {
        currentEvent = { name: "ЗВЕЗДНЫЙ ДОЖДЬ", desc: "С неба падают метеориты! Монет в 2 раза больше" };
    } else if (eventRand < 0.30) {
        currentEvent = { name: "ЗОЛОТАЯ ЛИХОРАДКА", desc: "Из сундуков вылетает гора золота" };
    } else {
        currentEvent = { name: "НЕТ", desc: "Обычные условия выживания" };
    }

    platforms = [
        { x: 0, y: 450, width: 800, height: 50, color: currentBiome.plat, type: 'normal' },
        { x: 0, y: 0, width: 20, height: 500, color: '#333', type: 'wall' },
        { x: 780, y: 0, width: 20, height: 500, color: '#333', type: 'wall' }
    ]; 
    coins = []; enemies = []; chests = []; bullets = []; spikes = [];
    
    if (currentLevel % 5 === 0) {
        currentEvent = { name: "БИТВА С БОССОМ", desc: "Уничтожьте Кибер-Глаз!" };
        boss = { x: 350, y: 120, width: 100, height: 80, hp: 100, maxHp: 100, attackTimer: 90, phase: 1, vx: 2 };
        door = { x: 380, y: 386, width: 44, height: 64, open: false };
        saveProgress();
        return;
    }

    let currentY = 380;
    let levelStyle = Math.floor(Math.random() * 4);
    
    if (levelStyle === 0) {
        let currentX = 200;
        while (currentY > 110) {
            let width = Math.random() * 40 + 80;
            let typeRand = Math.random();
            let type = 'normal'; let platColor = currentBiome.plat;
            if (typeRand < 0.15) { type = 'ice'; platColor = '#8ad1ff'; }
            else if (typeRand < 0.30) { type = 'mud'; platColor = '#3b2618'; }
            else if (typeRand < 0.40) { type = 'bounce'; platColor = '#e60067'; }

            platforms.push({ x: currentX, y: currentY, width: width, height: 20, color: platColor, type: type, timer: 60 });
            spawnObjectsOnPlatform(currentX, currentY, width);
            currentX += (Math.random() > 0.5 ? 160 : -160);
            if (currentX < 40) currentX = 140;
            if (currentX > 640) currentX = 500;
            currentY -= 65;
        }
    } 
    else if (levelStyle === 1) {
        platforms.push({ x: 350, y: 160, width: 100, height: 220, color: currentBiome.plat, type: 'normal' });
        while (currentY > 110) {
            let width = Math.random() * 30 + 55;
            let currentX = (currentY % 130 === 0) ? Math.random() * 120 + 50 : Math.random() * 120 + 580;
            let typeRand = Math.random();
            let type = typeRand < 0.25 ? 'bounce' : 'normal';
            let platColor = type === 'bounce' ? '#e60067' : currentBiome.plat;

            platforms.push({ x: currentX, y: currentY, width: width, height: 20, color: platColor, type: type, timer: 60 });
            spawnObjectsOnPlatform(currentX, currentY, width);
            currentY -= 60;
        }
    } 
    else if (levelStyle === 2) {
        while (currentY > 110) {
            let width = Math.random() * 40 + 70;
            let currentX = (currentY % 120 === 0) ? 20 : 780 - width;
            let typeRand = Math.random();
            let type = typeRand < 0.20 ? 'ice' : 'normal';
            let platColor = type === 'ice' ? '#8ad1ff' : currentBiome.plat;

            platforms.push({ x: currentX, y: currentY, width: width, height: 20, color: platColor, type: type, timer: 60 });
            spawnObjectsOnPlatform(currentX, currentY, width);
            currentY -= 65;
        }
    } 
    else {
        while (currentY > 110) {
            let width = Math.random() * 50 + 60;
            let currentX = Math.random() * (720 - width) + 40;
            let typeRand = Math.random();
            let type = 'normal'; let platColor = currentBiome.plat;
            if (typeRand < 0.15) { type = 'ice'; platColor = '#8ad1ff'; }
            else if (typeRand < 0.30) { type = 'mud'; platColor = '#3b2618'; }
            else if (typeRand < 0.45) { type = 'break'; platColor = '#ff9900'; }

            platforms.push({ x: currentX, y: currentY, width: width, height: 20, color: platColor, type: type, timer: 60 });
            spawnObjectsOnPlatform(currentX, currentY, width);
            currentY -= 62;
        }
    }

    platforms.push({ x: 340, y: 90, width: 120, height: 20, color: currentBiome.plat, type: 'normal' });
    door = { x: 380, y: 26, width: 40, height: 64, open: false }; 
    
    if (Math.random() < 0.5) {
        chests.push({ x: 345, y: 65, width: 26, height: 25, opened: false });
    }

    saveProgress();
}

function spawnObjectsOnPlatform(x, y, w) {
    let coinsCount = (currentEvent.name === "ЗВЕЗДНЫЙ ДОЖДЬ") ? 2 : 1;
    for (let i = 0; i < coinsCount; i++) {
        coins.push({ x: x + (w / (coinsCount + 1)) * (i + 1), y: y - 25, radius: 7, collected: false });
    }

    if (Math.random() < 0.25) {
        spikes.push({ x: x + w/2 - 15, y: y - 10, width: 30, height: 10 });
    }

    let enemyRand = Math.random();
    if (enemyRand < 0.12) {
        enemies.push({ x: x + 5, y: y - 26, width: 24, height: 26, vx: 1.1, minX: x, maxX: x + w - 24, type: 'patrol' });
    } else if (enemyRand < 0.24) {
        enemies.push({ x: x + w/2 - 10, y: y - 45, width: 20, height: 20, vx: 0.7, minX: x, maxX: x + w - 20, baseScaleY: y - 45, timeTrack: Math.random() * 10, type: 'drone' });
    } else if (enemyRand < 0.32) {
        enemies.push({ x: x + w/2 - 12, y: y - 30, width: 24, height: 30, shootCooldown: Math.random() * 90 + 40, type: 'turret' });
    }
}function updateShop() {
    metaUpgradesGrid.innerHTML = '';
    const upgrades = [
        { id: 'armor', name: '🛡️ ПРОЧНАЯ БРОНЯ', desc: 'Шанс заблокировать урон (+10%/ур)', current: upgradeArmor, max: 3, basePrice: 400 },
        { id: 'magnet', name: '🧲 МАГНИТ ДЛЯ МОНЕТ', desc: 'Притягивает золото на расстоянии', current: upgradeMagnet, max: 1, basePrice: 600 },
        { id: 'health', name: '❤️ КРЕПКОЕ ЗДОРОВЬЕ', desc: 'Увеличивает макс. жизни на +1', current: upgradeHealth, max: 2, basePrice: 1000 }
    ];

    upgrades.forEach(upg => {
        let card = document.createElement('div');
        card.className = 'upgrade-card';
        let isMax = upg.current >= upg.max;
        let price = upg.basePrice * (upg.current + 1) * 2;
        card.innerHTML = `
            <div class="upgrade-name">${upg.name}</div>
            <div class="upgrade-level">Ур: ${upg.current} / ${upg.max}</div>
            <div class="upgrade-desc" style="font-size:8px; color:#aaa; margin-bottom:4px;">${upg.desc}</div>
            <div class="upgrade-price">${isMax ? 'МАКС' : price + ' 🪙'}</div>
        `;
        card.onclick = () => {
            if (!isMax && score >= price) {
                score -= price;
                if (upg.id === 'armor') upgradeArmor++;
                if (upg.id === 'magnet') upgradeMagnet++;
                if (upg.id === 'health') upgradeHealth++;
                saveProgress();
                updateShop();
            }
        };
        metaUpgradesGrid.appendChild(card);
    });

    skinsGrid.innerHTML = '';
    skinsData.forEach(skin => {
        let isPurchased = purchasedSkins.includes(skin.id);
        let isActive = player.skinId === skin.id;
        let card = document.createElement('div');
        card.className = `skin-card ${isActive ? 'active' : ''}`;
        card.innerHTML = `
            <div class="skin-preview" style="background:${skin.color}"></div>
            <div class="skin-name">${skin.name}</div>
            <div class="skin-desc">${skin.desc}</div>
            <div class="skin-price">${isActive ? 'АКТИВЕН' : (isPurchased ? 'ВЫБРАТЬ' : skin.price + ' 🪙')}</div>
        `;
        card.onclick = () => {
            if (isPurchased) {
                player.skinId = skin.id; 
                player.color = skin.color;
                saveProgress();
            } else if (score >= skin.price) {
                score -= skin.price; 
                purchasedSkins.push(skin.id);
                player.skinId = skin.id; 
                player.color = skin.color;
                saveProgress();
            }
            updateShop();
        };
        skinsGrid.appendChild(card);
    });
}

let reviveTimer = null;
let timeLeft = 300;
function startReviveTimer() {
    timeLeft = 300;
    clearInterval(reviveTimer);
    reviveTimer = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        let s = (timeLeft % 60).toString().padStart(2, '0');
        timerText.textContent = `${m}:${s}`;
        if (timeLeft <= 0) {
            clearInterval(reviveTimer);
            currentLevel = 1; score = 0; 
            generateNewLevel();
        }
    }, 1000);
}

function handleDeath() {
    if (upgradeArmor > 0 && Math.random() < (upgradeArmor * 0.10)) {
        player.invulnerable = 45;
        for (let i = 0; i < 8; i++) spawnParticle(player.x + 13, player.y + 22, 'cyan');
        return;
    }

    player.lives--;
    comboCount = 0; comboTimer = 0;
    if (player.lives <= 0) {
        isGameOver = true;
        overlay.style.display = 'flex';
        startReviveTimer();
        updateShop();
    } else {
        player.x = 385; player.y = 350; player.vx = 0; player.vy = 0;
        player.invulnerable = (player.skinId === 'ghost') ? 120 : 60;
        player.hookActive = false;
    }
    saveProgress();
}

document.getElementById('testReviveBtn').onclick = () => {
    let maxAllowedLives = (player.skinId === 'ninja') ? 2 : 3;
    maxAllowedLives += upgradeHealth;
    if (score >= 100) {
        score -= 100; player.lives = maxAllowedLives; isGameOver = false; overlay.style.display = 'none'; clearInterval(reviveTimer); generateNewLevel();
    } else { alert("Недостаточно монет!"); }
};window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if (e.code === 'KeyW' || e.code === 'Space' || e.code === 'ArrowUp') jump(); 
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') executeDash();
    if (e.code === 'KeyE') launchHook();
    if (e.code === 'KeyQ') activateParry();
});

window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        let now = performance.now();
        if (now - player.lastLeftTime < 250) executeDash(-1);
        player.lastLeftTime = now;
    }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        let now = performance.now();
        if (now - player.lastRightTime < 250) executeDash(1);
        player.lastRightTime = now;
    }
    keys[e.code] = false;
});

const bLeft = document.getElementById('btnLeft'); const bRight = document.getElementById('btnRight'); const bJump = document.getElementById('btnJump');
const bDash = document.getElementById('btnDash'); const bHook = document.getElementById('btnHook'); const bParry = document.getElementById('btnParry');

if (bLeft) { bLeft.ontouchstart = (e) => { e.preventDefault(); keys['ArrowLeft'] = true; }; bLeft.ontouchend = () => keys['ArrowLeft'] = false; }
if (bRight) { bRight.ontouchstart = (e) => { e.preventDefault(); keys['ArrowRight'] = true; }; bRight.ontouchend = () => keys['ArrowRight'] = false; }
if (bJump) { bJump.ontouchstart = (e) => { e.preventDefault(); jump(); }; }
if (bDash) { bDash.ontouchstart = (e) => { e.preventDefault(); executeDash(); }; }
if (bHook) { bHook.ontouchstart = (e) => { e.preventDefault(); launchHook(); }; }
if (bParry) { bParry.ontouchstart = (e) => { e.preventDefault(); activateParry(); }; }

function spawnParticle(x, y, color) {
    particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        alpha: 1,
        color: color,
        size: Math.random() * 3 + 2
    });
}

function jump() {
    let maxAllowedJumps = (player.skinId === 'ninja') ? 3 : 2;
    let calculatedJump = (player.skinId === 'cyborg') ? player.jumpStrength * 0.95 : player.jumpStrength;

    if (player.onGround || player.jumpCount < maxAllowedJumps) {
        player.vy = -calculatedJump; 
        player.jumpCount++; 
        player.onGround = false;
        player.hookActive = false;
        for (let i = 0; i < 6; i++) spawnParticle(player.x + 13, player.y + 44, '#888');
    }
}

function executeDash(forcedDir = 0) {
    let calculatedCd = (player.skinId === 'cyborg') ? 25 : 45;
    if (player.dashCooldown > 0 || isGameOver) return;
    
    let dir = forcedDir;
    if (dir === 0) {
        if (keys['ArrowLeft'] || keys['KeyA']) dir = -1;
        else if (keys['ArrowRight'] || keys['KeyD']) dir = 1;
        else dir = (player.vx >= 0) ? 1 : -1;
    }
    
    player.dashTimer = 10;
    player.dashCooldown = calculatedCd;
    player.dashDir = dir;
    player.vy = 0;
    player.hookActive = false;
}

function launchHook() {
    if (isGameOver) return;
    if (player.hookActive) {
        player.hookActive = false;
        return;
    }
    let bestP = null;
    let minDist = 250;
    platforms.forEach(p => {
        if (p.type !== 'wall' && p.y < player.y) {
            let px = p.x + p.width / 2;
            let py = p.y;
            let dist = Math.hypot(px - (player.x + player.width/2), py - player.y);
            if (dist < minDist) {
                minDist = dist;
                bestP = { x: px, y: py };
            }
        }
    });

    if (bestP) {
        player.hookActive = true;
        player.hookX = bestP.x;
        player.hookY = bestP.y;
        player.hookLen = minDist;
        player.hookAngle = Math.atan2(player.y - player.hookY, player.x + player.width/2 - player.hookX);
        player.hookSpeed = 0;
    }
}

function activateParry() {
    if (player.parryCooldown > 0 || isGameOver) return;
    player.parryActive = 20;
    player.parryCooldown = 90;
}

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function updateCoinsCheck() {
    let remaining = coins.filter(c => !c.collected).length;
    if (remaining === 0 && coins.length > 0 && !boss) {
        door.open = true;
    } else {
        door.open = false;
    }
}function gameLoop() {
    if (freezeFrame > 0) {
        freezeFrame--;
        requestAnimationFrame(gameLoop);
        return;
    }

    ctx.fillStyle = currentBiome.bg; ctx.clearRect(0,0,800,500); ctx.fillRect(0,0,800,500);

    if (!isGameOver) {
        if (player.dashCooldown > 0) player.dashCooldown--;
        if (player.parryCooldown > 0) player.parryCooldown--;
        if (player.parryActive > 0) player.parryActive--;

        if (comboTimer > 0) {
            comboTimer--;
            if (comboTimer <= 0) { comboCount = 0; }
        }

        if (player.hookActive) {
            let px = player.x + player.width / 2;
            let py = player.y + player.height / 2;
            let hookG = 0.25;
            let angleAcc = -hookG * Math.sin(player.hookAngle) / player.hookLen;
            
            if (keys['ArrowLeft'] || keys['KeyA']) angleAcc -= 0.003;
            if (keys['ArrowRight'] || keys['KeyD']) angleAcc += 0.003;
            
            player.hookSpeed += angleAcc;
            player.hookSpeed *= 0.992;
            player.hookAngle += player.hookSpeed;
            
            player.x = player.hookX + Math.cos(player.hookAngle) * player.hookLen - player.width / 2;
            player.y = player.hookY + Math.sin(player.hookAngle) * player.hookLen - player.height / 2;
            player.vx = -player.hookSpeed * player.hookLen * Math.sin(player.hookAngle);
            player.vy = player.hookSpeed * player.hookLen * Math.cos(player.hookAngle);
        } 
        else if (player.dashTimer > 0) {
            player.vx = player.dashDir * 13;
            player.vy = 0;
            player.dashTimer--;
            if (player.dashTimer % 2 === 0) {
                dashEchoes.push({ x: player.x, y: player.y, color: player.color, alpha: 0.6 });
            }
        } 
        else {
            let accel = standingOnIce ? 0.12 : (standingOnMud ? 0.04 : 0.55);
            let friction = standingOnIce ? 0.99 : (standingOnMud ? 0.65 : 0.82);
            let maxSpd = standingOnMud ? 2.2 : player.speed;

            if (standingOnIce && player.skinId === 'vulcan') {
                accel = 0.05; friction = 0.997;
            }

            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx -= accel;
                if (player.onGround && Math.random() < 0.2) spawnParticle(player.x + player.width, player.y + player.height, '#555');
            }
            else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx += accel;
                if (player.onGround && Math.random() < 0.2) spawnParticle(player.x, player.y + player.height, '#555');
            }
            else player.vx *= friction;

            if (player.vx > maxSpd) player.vx = maxSpd; 
            if (player.vx < -maxSpd) player.vx = -maxSpd;

            player.vy += gravity;
        }

        if (!player.hookActive) {
            player.x += player.vx; 
            player.y += player.vy;
        }

        if (player.invulnerable > 0) player.invulnerable--;
        if (player.y > 500) handleDeath();

        standingOnIce = false; standingOnMud = false; player.onGround = false;

        if (boss) {
            boss.x += boss.vx;
            if (boss.x < 40 || boss.x > 760 - boss.width) boss.vx *= -1;
            boss.attackTimer--;
            if (boss.attackTimer <= 0) {
                let count = boss.hp < 50 ? 5 : 3;
                for (let i = 0; i < count; i++) {
                    let angle = (Math.PI / (count - 1)) * i;
                    bullets.push({ x: boss.x + boss.width / 2, y: boss.y + boss.height, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3 });
                }
                boss.attackTimer = boss.hp < 50 ? 60 : 90;
            }
            if (Math.random() < 0.015 && boss.hp < 50) {
                enemies.push({ x: boss.x + boss.width / 2, y: boss.y + boss.height, width: 20, height: 20, vx: Math.random() > 0.5 ? 1 : -1, minX: 40, maxX: 740, baseScaleY: 300, timeTrack: 0, type: 'drone' });
            }
        }        platforms.forEach(p => {
            ctx.fillStyle = p.color; 
            ctx.fillRect(p.x, p.y, p.width, p.height);

            if (p.type === 'break' && checkCollision(player, p) && player.vy > 0) {
                p.timer--;
                if (p.timer <= 0) {
                    platforms = platforms.filter(item => item !== p);
                    return;
                }
                p.color = Math.floor(p.timer) % 6 < 3 ? '#ff3300' : '#ff9900';
            }

            if (player.vx > 0 && checkCollision(player, p) && player.x + player.width - player.vx <= p.x) { player.x = p.x - player.width; player.vx = 0; }
            if (player.vx < 0 && checkCollision(player, p) && player.x - player.vx >= p.x + p.width) { player.x = p.x + p.width; player.vx = 0; }
            
            if (checkCollision(player, p)) {
                if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 4) {
                    player.y = p.y - player.height; player.vy = 0; player.onGround = true; player.jumpCount = 0;
                    if (p.type === 'ice') standingOnIce = true;
                    if (p.type === 'mud') standingOnMud = true;
                    if (p.type === 'bounce') { player.vy = -player.jumpStrength * 1.25; player.onGround = false; }
                }
            }
        });

        spikes.forEach(s => {
            ctx.fillStyle = '#ff3333';
            ctx.beginPath();
            ctx.moveTo(s.x, s.y + s.height);
            ctx.lineTo(s.x + s.width / 2, s.y);
            ctx.lineTo(s.x + s.width, s.y + s.height);
            ctx.closePath();
            ctx.fill();
            if (checkCollision(player, s) && player.invulnerable <= 0) { handleDeath(); }
        });

        coins.forEach(c => {
            if (!c.collected) {
                if (upgradeMagnet > 0) {
                    let dx = (player.x + player.width / 2) - c.x;
                    let dy = (player.y + player.height / 2) - c.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < 120) {
                        c.x += (dx / dist) * 3.5;
                        c.y += (dy / dist) * 3.5;
                    }
                }

                ctx.fillStyle = currentBiome.coin; ctx.beginPath(); ctx.arc(c.x, c.y, c.radius, 0, Math.PI*2); ctx.fill();
                if (Math.abs(player.x + player.width/2 - c.x) < player.width/2 + c.radius && Math.abs(player.y + player.height/2 - c.y) < player.height/2 + c.radius) {
                    c.collected = true; 
                    comboCount++; comboTimer = 180; 
                    score += 1;
                    for (let i = 0; i < 6; i++) spawnParticle(c.x, c.y, '#ffcc00');
                    saveProgress();
                }
            }
        });
        updateCoinsCheck();

        chests.forEach(ch => {
            ctx.fillStyle = ch.opened ? '#664422' : '#b5702d'; ctx.fillRect(ch.x, ch.y, ch.width, ch.height);
            if (!ch.opened && checkCollision(player, ch)) { 
                ch.opened = true; 
                let reward = (currentEvent.name === "ЗОЛОТАЯ ЛИХОРАДКА") ? 15 : 5;
                if (player.skinId === 'midas') reward = Math.floor(reward * 1.4); 
                score += reward; 
                for (let i = 0; i < 15; i++) spawnParticle(ch.x + 13, ch.y + 12, '#ffea00');
                saveProgress(); 
            }
        });

        bullets.forEach(b => {
            b.x += b.vx; b.y += (b.vy || 0);
            ctx.fillStyle = '#ff3300'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            
            let bulletRect = { x: b.x - 4, y: b.y - 4, width: 8, height: 8 };
            if (checkCollision(player, bulletRect)) {
                bullets = bullets.filter(item => item !== b);
                if (player.parryActive > 0) { 
                    comboCount++; score += 2;
                    for (let i = 0; i < 8; i++) spawnParticle(b.x, b.y, 'cyan');
                } else if (player.invulnerable <= 0) { handleDeath(); }
            }
        });
        bullets = bullets.filter(b => b.x > 0 && b.x < 800 && b.y > 0 && b.y < 500);

        enemies.forEach(e => {
            if (e.type === 'patrol') {
                e.x += e.vx; if (e.x < e.minX || e.x > e.maxX) e.vx *= -1;
                ctx.fillStyle = '#ff1111'; ctx.fillRect(e.x, e.y, e.width, e.height);
            } else if (e.type === 'drone') {
                e.x += e.vx; if (e.x < e.minX || e.x > e.maxX) e.vx *= -1;
                e.timeTrack += 0.05; e.y = e.baseScaleY + Math.sin(e.timeTrack) * 25;
                ctx.fillStyle = '#ff5500'; ctx.fillRect(e.x, e.y, e.width, e.height);
            } else if (e.type === 'turret') {
                e.shootCooldown--;
                if (e.shootCooldown <= 0) {
                    let bDir = (player.x < e.x) ? -3.5 : 3.5;
                    bullets.push({ x: e.x + e.width/2, y: e.y + 10, vx: bDir, vy: 0 });
                    e.shootCooldown = 110;
                }
                ctx.fillStyle = '#990000'; ctx.fillRect(e.x, e.y, e.width, e.height);
            }

            if (checkCollision(player, e)) {
                if (player.parryActive > 0) { 
                    enemies = enemies.filter(item => item !== e);
                    comboCount++; score += 3; 
                    freezeFrame = 5;
                    for (let i = 0; i < 12; i++) spawnParticle(e.x + e.width/2, e.y + e.height/2, '#ff1111');
                    saveProgress();
                } else if (player.invulnerable <= 0) { 
                    handleDeath(); 
                }
            }
        });

        if (boss && checkCollision(player, boss)) {
            if (player.parryActive > 0) {
                boss.hp -= 10;
                player.vy = -8;
                player.parryActive = 0;
                freezeFrame = 8;
                for (let i = 0; i < 15; i++) spawnParticle(player.x + 13, player.y, '#00ffff');
                if (boss.hp <= 0) {
                    boss = null; door.open = true; score += 50; saveProgress();
                }
            } else if (player.invulnerable <= 0) {
                handleDeath();
            }
        }

        if (currentEvent.name === "ЗВЕЗДНЫЙ ДОЖДЬ" && Math.random() < 0.02) {
            bullets.push({ x: Math.random() * 740 + 20, y: 10, vx: (Math.random() - 0.5) * 2, vy: 4 });
        }

        dashEchoes.forEach(echo => {
            ctx.save(); ctx.globalAlpha = echo.alpha; ctx.fillStyle = echo.color;
            ctx.fillRect(echo.x, echo.y, 26, 44); ctx.restore(); echo.alpha -= 0.05;
        });
        dashEchoes = dashEchoes.filter(echo => echo.alpha > 0);

        particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
            ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size); ctx.restore();
        });
        particles = particles.filter(p => p.alpha > 0);

        if (player.hookActive) {
            ctx.strokeStyle = 'yellow'; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(player.hookX, player.hookY); ctx.lineTo(player.x + player.width/2, player.y + player.height/2); ctx.stroke();
        }

        if (player.parryActive > 0) {
            ctx.strokeStyle = 'cyan'; ctx.lineWidth = 3; ctx.beginPath();
            ctx.arc(player.x + player.width/2, player.y + player.height/2, 32, 0, Math.PI*2); ctx.stroke();
        }

        if (boss) {
            ctx.fillStyle = '#ff0055'; ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
            ctx.fillStyle = '#222'; ctx.fillRect(200, 20, 400, 14);
            ctx.fillStyle = '#ff0055'; ctx.fillRect(200, 20, 400 * (boss.hp / boss.maxHp), 14);
            ctx.fillStyle = '#fff'; ctx.font = "bold 10px Arial"; ctx.fillText("КИБЕР-ГЛАЗ", 370, 31);
        }

        ctx.fillStyle = door.open ? currentBiome.door : '#444444'; ctx.fillRect(door.x, door.y, door.width, door.height);
        if (door.open && checkCollision(player, door)) { currentLevel++; generateNewLevel(); }

        ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial";
    ctx.fillText(`УРОВЕНЬ: ${currentLevel} (${currentBiome.name})`, 20, 25);
    ctx.fillText(`МОНЕТЫ: ${score} 🪙`, 20, 48);
    ctx.fillText(`ЖИЗНИ: ${'❤️'.repeat(Math.max(0, player.lives))}`, 20, 71);
    
    let remCoins = coins.filter(c => !c.collected).length;
    ctx.fillStyle = remCoins > 0 ? '#ffcc00' : '#00ffcc';
    if (!boss) ctx.fillText(remCoins > 0 ? `ОСТАЛОСЬ МОНЕТ: ${remCoins} 🪙` : "ВЫХОД ОТКРЫТ! 🚪", 20, 94);

    if (comboCount > 0) {
        ctx.fillStyle = '#ff0055'; ctx.font = "italic bold 14px Arial";
        ctx.fillText(`КОМБО: X${comboCount} 🔥`, 20, 118);
    }

    ctx.fillStyle = "#888"; ctx.font = "11px Arial";
    ctx.fillText(`СОБЫТИЕ: ${currentEvent.name} (${currentEvent.desc})`, 20, 485);

    requestAnimationFrame(gameLoop);
}

document.getElementById('downloadBtn').onclick = () => {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'hardcore_platformer_v17.html';
    a.click();
};

generateNewLevel();
gameLoop();
</script>
