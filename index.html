<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Бесконечные миры и уровни-комнаты</title>
<style>
    body {
        background: #1a1a1a;
        margin: 0;
        padding: 20px;
    }
    canvas {
        background: #222; 
        display: block;
        margin: 0 auto;
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    .hint {
        text-align: center;
        color: #888;
        font-family: Arial, sans-serif;
        margin-top: 15px;
        font-size: 14px;
    }
    /* Стили для кнопки скачивания */
    .download-container {
        text-align: center;
        margin-top: 15px;
    }
    .download-btn {
        background-color: lime;
        color: #111;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        transition: all 0.2s ease;
    }
    .download-btn:hover {
        background-color: #00cc00;
        transform: translateY(-2px);
    }
    .download-btn:active {
        transform: translateY(0);
    }
</style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="500"></canvas>
<div class="hint">Управление: Стрелки / WASD | Прыжок: Пробел / W (доступен двойной прыжок)</div>

<!-- Контейнер с кнопкой -->
<div class="download-container">
    <button class="download-btn" id="downloadBtn">Скачать игру (.html)</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Игрок (классический лаймовый кубик)
const player = { 
    x: 50, 
    y: 400, 
    width: 30, 
    height: 50, 
    color: 'lime', 
    vy: 0, 
    speed: 5, 
    jumpStrength: 14, 
    onGround: false,
    jumpCount: 0,     
    maxJumps: 2       
};

const gravity = 0.7;
const keys = {};

// Игровые объекты
let platforms = [];
let coins = [];
let door = { x: 720, y: 80, width: 40, height: 60, open: false };

// Переменные прогресса
let currentLevel = 1;
let score = 0;

// Конфигурация бесконечных миров (биомов)
const biomes = [
    { name: "КЛАССИЧЕСКИЙ МИР", bg: "#222222", plat: "#8B4513", coin: "gold", door: "#4aeade" },
    { name: "ИЗУМРУДНЫЙ ЛЕС", bg: "#142518", plat: "#2e5c36", coin: "#00FF7F", door: "#ADFF2F" },
    { name: "НЕОНОВЫЙ КИБЕР", bg: "#120a1c", plat: "#ff0055", coin: "#00FFFF", door: "#ba00ff" },
    { name: "ПУСТЫНЯ СМЕРТИ", bg: "#2c2417", plat: "#d2b48c", coin: "#FF4500", door: "#FFD700" },
    { name: "ЛЕДЯНЫЕ ПЕЩЕРЫ", bg: "#15222e", plat: "#4682B4", coin: "#E0FFFF", door: "#00FFFF" },
    { name: "БЕСКОНЕЧНЫЙ КОСМОС", bg: "#05050a", plat: "#4B0082", coin: "#FFFFFF", door: "#FF00FF" }
];

let currentBiome = biomes[0];

// Функция генерации нового случайного уровня
function generateNewLevel() {
    let biomeIndex = Math.floor((currentLevel - 1) / 3) % biomes.length;
    currentBiome = biomes[biomeIndex];

    player.x = 50;
    player.y = 350;
    player.vy = 0;
    player.jumpCount = 0;

    platforms = [
        { x: 0, y: 450, width: 800, height: 50, color: currentBiome.plat }
    ];

    coins = [];

    let numPlatforms = Math.floor(Math.random() * 3) + 3; 
    
    for (let i = 0; i < numPlatforms; i++) {
        let platWidth = Math.random() * 50 + 110; 
        let platX = 120 + i * 140 + (Math.random() * 40 - 20);
        let platY = 370 - i * 75 - (Math.random() * 30);

        if (platX + platWidth > canvas.width) platX = canvas.width - platWidth - 20;

        platforms.push({
            x: platX,
            y: platY,
            width: platWidth,
            height: 20,
            color: currentBiome.plat
        });

        coins.push({
            x: platX + platWidth / 2 - 5,
            y: platY - 25,
            size: 10,
            collected: false
        });
    }

    let lastPlat = platforms[platforms.length - 1];
    door.x = lastPlat.x + lastPlat.width / 2 - 20;
    door.y = lastPlat.y - 60;
    door.open = false;
}

generateNewLevel();

// Логика скачивания текущей страницы
document.getElementById('downloadBtn').addEventListener('click', () => {
    // Получаем весь HTML код текущей страницы
    const htmlCode = document.documentElement.outerHTML;
    
    // Создаем файл в памяти браузера
    const blob = new Blob([htmlCode], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    
    // Скачиваем файл
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-platformer.html'; // Имя скачиваемого файла
    document.body.appendChild(a);
    a.click();
    
    // Очищаем память
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});

// Управление
document.addEventListener('keydown', (e) => { 
    if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') && !keys[e.key]) {
        if (player.jumpCount < player.maxJumps) {
            player.vy = -player.jumpStrength;
            player.jumpCount++;
            player.onGround = false;
        }
    }
    keys[e.key] = true; 
});

document.addEventListener('keyup', (e) => { 
    keys[e.key] = false; 
});

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width && 
           rect1.x + rect1.width > rect2.x && 
           rect1.y < rect2.y + rect2.height && 
           rect1.y + rect1.height > rect2.y;
}

function gameLoop() {
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.vy += gravity;
    player.y += player.vy;
    player.onGround = false;

    for (const plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.vy >= 0 && player.y + player.height - player.vy <= plat.y + 5) {
                player.y = plat.y - player.height;
                player.vy = 0;
                player.onGround = true;
                player.jumpCount = 0; 
            }
        }
    }

    if (player.y + player.height > canvas.height) {
        player.y = canvas.height - player.height;
        player.vy = 0;
        player.onGround = true;
        player.jumpCount = 0;
    }

    let allCollected = true;
    for (const coin of coins) {
        if (!coin.collected) {
            allCollected = false; 
            if (player.x < coin.x + coin.size && player.x + player.width > coin.x && player.y < coin.y + coin.size && player.y + player.height > coin.y) {
                coin.collected = true;
                score++;
            }
        }
    }

    if (allCollected) {
        door.open = true;
    }

    if (door.open && checkCollision(player, door)) {
        currentLevel++;
        generateNewLevel();
    }

    ctx.fillStyle = currentBiome.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (const plat of platforms) {
        ctx.fillStyle = plat.color;
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    for (const coin of coins) {
        if (!coin.collected) {
            ctx.fillStyle = currentBiome.coin;
            ctx.beginPath();
            ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.fillStyle = door.open ? currentBiome.door : '#555'; 
    ctx.fillRect(door.x, door.y, door.width, door.height);
    
    ctx.fillStyle = 'gold';
    ctx.beginPath();
    ctx.arc(door.x + (door.open ? 8 : 32), door.y + 30, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    ctx.fillStyle = 'white';
    ctx.font = '20px Arial';
    ctx.fillText('Монет: ' + score, 15, 35);
    ctx.fillText('Уровень: ' + currentLevel, 670, 35);

    ctx.fillStyle = currentBiome.door;
    ctx.font = 'bold 16px Arial';
    ctx.fillText('МИР: ' + currentBiome.name, 15, 65);

    if (!door.open) {
        ctx.fillStyle = '#ffb3b3';
        ctx.font = '14px Arial';
        ctx.fillText('Соберите монеты, чтобы открыть проход', 300, 35);
    } else {
        ctx.fillStyle = '#b3ffb3';
        ctx.font = 'bold 14px Arial';
        ctx.fillText('Портал в следующий мир открыт!', 300, 35);
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
