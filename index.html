<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Бесконечный Фонк Платформер</title>
<style>
    canvas {
        background: #0d0614; /* Темно-фиолетовый фон в стиле фонк-артов */
        display: block;
        margin: 0 auto;
        box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
    }
    .hint {
        text-align: center;
        color: #8a2be2;
        font-family: Arial, sans-serif;
        margin-top: 10px;
        font-size: 14px;
    }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div class="hint">Кликните по экрану, чтобы включить ФОНК трек 🎧</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const player = { 
    x: 400, 
    y: 500, 
    width: 30, 
    height: 45, 
    color: '#ff0055', // Агрессивный розовый цвет неона
    vy: 0, 
    speed: 6, 
    jumpStrength: 14, 
    onGround: false,
    jumpCount: 0,     
    maxJumps: 2       
};

const gravity = 0.6;
const keys = {};
const camera = { y: 0 };

let score = 0;
let highestY = 500;
let platforms = [];
let coins = [];
let nextPlatformY = 450; 

// --- ЗВУКОВОЙ ДВИЖОК PHONK ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioStarted = false;

// Мелодия ковбелла (частоты в Гц)
const cowbellMelody = [
    587.33, 587.33, 0, 659.25, 
    783.99, 783.99, 740.00, 0,
    587.33, 587.33, 0, 880.00, 
    783.99, 0, 659.25, 0
];
// Тяжелый 808 бас
const bassMelody = [73.42, 73.42, 73.42, 82.41, 98.00, 98.00, 92.50, 92.50];

let step = 0;

function playPhonkStep() {
    if (!audioStarted) return;

    const time = audioCtx.currentTime;

    // 1. СИНТЕЗ КОВБЕЛЛА (Фирменный высокий звук фонка)
    let freq = cowbellMelody[step % cowbellMelody.length];
    if (freq > 0) {
        let osc1 = audioCtx.createOscillator();
        let osc2 = audioCtx.createOscillator();
        let cowbellGain = audioCtx.createGain();

        osc1.type = 'square';
        osc1.frequency.setValueAtTime(freq, time);
        // Небольшая расстройка для металлического звука
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(freq * 1.49, time); 

        cowbellGain.gain.setValueAtTime(0.06, time);
        cowbellGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);

        osc1.connect(cowbellGain);
        osc2.connect(cowbellGain);
        cowbellGain.connect(audioCtx.destination);

        osc1.start(time);
        osc2.start(time);
        osc1.stop(time + 0.15);
        osc2.stop(time + 0.15);
    }

    // 2. СИНТЕЗ ТЯЖЕЛОГО 808 БАСА (Каждые 2 шага)
    if (step % 2 === 0) {
        let bassOsc = audioCtx.createOscillator();
        let bassGain = audioCtx.createGain();
        let bassFreq = bassMelody[Math.floor(step / 2) % bassMelody.length];

        bassOsc.type = 'triangle'; // Мягкая волна для глубокого баса
        bassOsc.frequency.setValueAtTime(bassFreq, time);
        // Эффект скольжения (pitch glide), типичный для фонка
        bassOsc.frequency.exponentialRampToValueAtTime(bassFreq * 0.7, time + 0.25);

        bassGain.gain.setValueAtTime(0.3, time);
        bassGain.gain.linearRampToValueAtTime(0.001, time + 0.25);

        bassOsc.connect(bassGain);
        bassGain.connect(audioCtx.destination);

        bassOsc.start(time);
        bassOsc.stop(time + 0.25);
    }

    // 3. КЛЭП / ХЭТ (Шум на заднем фоне для ритма)
    if (step % 4 === 2) {
        let noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        let output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBuffer.length; i++) {
            output[i] = Math.random() * 2 - 1;
        }
        let noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = noiseBuffer;
        let noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.03, time);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
        noiseNode.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        noiseNode.start(time);
    }

    step++;
    setTimeout(playPhonkStep, 150); // Скорость ~150 BPM
}

// Звуковой эффект при подборе монеты
function playCoinSound() {
    if (!audioStarted) return;
    const time = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, time);
    osc.frequency.setValueAtTime(1320, time + 0.08); // Быстрый арпеджио вверх
    
    gain.gain.setValueAtTime(0.1, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + 0.2);
}

// Активация музыки по клику
window.addEventListener('click', () => {
    if (!audioStarted) {
        audioCtx.resume();
        audioStarted = true;
        playPhonkStep();
    }
});

// --- ЛОГИКА ИГРЫ ---
function generatePlatforms() {
    while (nextPlatformY > camera.y - 1000) {
        let width = Math.random() * 60 + 80;
        let x = Math.random() * (canvas.width - width);
        // Неоновые цвета фиолетово-розовой гаммы
        let color = `hsl(${280 + Math.random() * 40}, 80%, 50%)`; 

        platforms.push({ x: x, y: nextPlatformY, width: width, height: 15, color: color });

        if (Math.random() < 0.4) {
            coins.push({
                x: x + width / 2 - 5,
                y: nextPlatformY - 25,
                size: 8,
                collected: false
            });
        }
        nextPlatformY -= Math.random() * 80 + 70; 
    }
    platforms = platforms.filter(p => p.y < camera.y + canvas.height + 200);
    coins = coins.filter(c => c.y < camera.y + canvas.height + 200);
}

platforms.push({ x: 0, y: 580, width: 800, height: 20, color: '#25123e' });
generatePlatforms();

document.addEventListener('keydown', (e) => { 
    if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') && !keys[e.key]) {
        if (player.jumpCount < player.maxJumps) {
            player.vy = -player.jumpStrength;
            player.jumpCount++;
            player.onGround = false;
        }
    }
    keys[e.key] = true; 
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width && 
           rect1.x + rect1.width > rect2.x && 
           rect1.y < rect2.y + rect2.height && 
           rect1.y + rect1.height > rect2.y;
}

function resetGame() {
    player.x = 400; player.y = 500; player.vy = 0; player.jumpCount = 0;
    camera.y = 0; score = 0; highestY = 500; nextPlatformY = 450;
    platforms = [{ x: 0, y: 580, width: 800, height: 20, color: '#25123e' }];
    coins = [];
    generatePlatforms();
}

function gameLoop() {
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    if (player.x + player.width < 0) player.x = canvas.width;
    if (player.x > canvas.width) player.x = -player.width;

    player.vy += gravity;
    player.y += player.vy;
    player.onGround = false;

    if (player.y < camera.y + canvas.height / 2) {
        camera.y = player.y - canvas.height / 2;
    }
    if (player.y < highestY) highestY = player.y;

    generatePlatforms();

    for (const plat of platforms) {
        if (checkCollision(player, plat) && player.vy > 0 && player.y + player.height - player.vy <= plat.y + 2) {
            player.y = plat.y - player.height;
            player.vy = 0;
            player.onGround = true;
            player.jumpCount = 0;
        }
    }

    for (const coin of coins) {
        if (!coin.collected && player.x < coin.x + coin.size && player.x + player.width > coin.x && player.y < coin.y + coin.size && player.y + player.height > coin.y) {
            coin.collected = true;
            score += 10;
            playCoinSound(); // Включаем звук монетки
        }
    }

    if (player.y > camera.y + canvas.height) {
        alert("DRIFT OVER! Очки: " + (score + Math.floor(Math.abs(highestY - 500) / 10)));
        resetGame();
        return requestAnimationFrame(gameLoop);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(0, -camera.y);

    for (const plat of platforms) {
        ctx.fillStyle = plat.color;
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    for (const coin of coins) {
        if (!coin.collected) {
            ctx.fillStyle = '#00ffff'; // Неоновые голубые монеты
            ctx.beginPath();
            ctx.arc(coin.x + coin.size / 2, coin.y + coin.size / 2, coin.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.restore();

    let totalScore = score + Math.floor(Math.abs(highestY - 500) / 10);
    ctx.fillStyle = '#fff';
    ctx.font = 'black 22px Courier New'; // Стильный моноширинный шрифт
    ctx.fillText('SCORE: ' + totalScore, 20, 40);

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
